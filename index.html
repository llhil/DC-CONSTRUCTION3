<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC CONSTRUCTION</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      color: #f4b400;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') no-repeat center/cover;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      animation: slideUp 2s ease-in-out;
    }

    .hero h2 {
      background: rgba(0,0,0,0.6);
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 24px;
    }

    .section {
      padding: 30px;
      text-align: center;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s;
      font-weight: bold;
    }

    .whatsapp { background: #25D366; }
    .facebook { background: #1877F2; }
    .call { background: #f4b400; color: black; }
    .map { background: #4285F4; }

    .buttons a:hover {
      transform: scale(1.1);
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideUp {
      from {transform: translateY(50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

  </style>
</head>
<body>

<header>
  <h1>DC CONSTRUCTION</h1>
  <p>Building Your Dream with Quality & Trust</p>
</header>

<div class="hero">
  <h2>Professional Construction Services</h2>
</div>

<div class="section">
  <h2>Contact Us</h2>

  <div class="buttons">
    <a class="whatsapp" href="https://wa.me/919879536926?text=Hello%20DC%20Construction,%20I%20want%20details%20about%20your%20services" target="_blank">
      WhatsApp Us
    </a>

    <a class="facebook" href="https://www.facebook.com/share/1FR4DTUHps/?mibextid=wwXIfr" target="_blank">
      Visit Facebook
    </a>

    <a class="call" href="tel:+919879536926">
      Call Now
    </a>
  </div>

  <p><strong>Phone:</strong> +91 9879536926</p>
</div>

<div class="section">
  <h2>Our Location</h2>

  <p>Find us easily on Google Maps:</p>

  <a class="map" href="https://maps.app.goo.gl/WXtLbTPjSeS5p9pK8?g_st=iw" target="_blank">
    View Location
  </a>

</div>

<footer>
  <p>© 2026 DC CONSTRUCTION | All Rights Reserved</p>
</footer>

</body>
</html>
